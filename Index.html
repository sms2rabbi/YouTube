<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>লোকেশন যাচাই</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.card{
    background:#fff;
    width:100%;
    max-width:400px;
    padding:25px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,.15);
    text-align:center;
}

h2{
    margin-bottom:10px;
}

p{
    color:#555;
    margin-bottom:20px;
}

button{
    width:100%;
    border:none;
    padding:14px;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
}

#shareBtn{
    background:#0d6efd;
    color:#fff;
}

#status{
    margin-top:15px;
    font-weight:bold;
    word-break:break-word;
}
</style>
</head>
<body>

<div class="card">
    <h2>লোকেশন যাচাই</h2>

    <p>
        চালিয়ে যেতে আপনার বর্তমান লোকেশন শেয়ার করুন।
    </p>

    <button id="shareBtn">
        লোকেশন শেয়ার করুন
    </button>

    <div id="status"></div>
</div>

<script>

const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbyVI_ebbrCdo0smzkMr-C6zcNAS5TAfn6KuMSI6XagtlNxElEioKe_7LBMaqx34M7fY/exec";

const btn = document.getElementById("shareBtn");
const statusBox = document.getElementById("status");

btn.addEventListener("click", getLocation);

function getLocation(){

    if(!navigator.geolocation){
        statusBox.innerHTML = "এই ব্রাউজারে লোকেশন সাপোর্ট নেই।";
        return;
    }

    statusBox.innerHTML = "লোকেশন নেওয়া হচ্ছে...";

    navigator.geolocation.getCurrentPosition(
        sendLocation,
        handleError,
        {
            enableHighAccuracy:true,
            timeout:15000,
            maximumAge:0
        }
    );
}

async function sendLocation(position){

    const payload = {
        latitude: position.coords.latitude,
        longitude: position.coords.longitude,
        accuracy: position.coords.accuracy,
        timestamp: new Date().toISOString(),
        userAgent: navigator.userAgent
    };

    try{

        const response = await fetch(
            WEB_APP_URL,
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify(payload)
            }
        );

        const text = await response.text();

        statusBox.innerHTML =
            "✓ লোকেশন সফলভাবে পাঠানো হয়েছে";

        console.log(text);

    }catch(err){

        console.error(err);

        statusBox.innerHTML =
            "লোকেশন পাঠানো যায়নি";
    }
}

function handleError(error){

    switch(error.code){

        case error.PERMISSION_DENIED:
            statusBox.innerHTML =
                "লোকেশন অনুমতি দেওয়া হয়নি";
            break;

        case error.POSITION_UNAVAILABLE:
            statusBox.innerHTML =
                "লোকেশন পাওয়া যাচ্ছে না";
            break;

        case error.TIMEOUT:
            statusBox.innerHTML =
                "লোকেশন নিতে সময় শেষ হয়েছে";
            break;

        default:
            statusBox.innerHTML =
                "অজানা সমস্যা হয়েছে";
    }
}

</script>

</body>
</html>
